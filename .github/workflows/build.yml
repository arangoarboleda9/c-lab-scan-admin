name: Build Windows EXE

on:
  push:
    branches: [ main ] # Se ejecutará cada vez que subas algo a la rama main

jobs:
  build:
    runs-on: windows-latest # Aquí es donde ocurre la magia (usa Windows real)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyrebase4 matplotlib numpy Pillow pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --add-data "logo.png;." admin_app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: C-LAB-Admin-Windows
        path: dist/admin_app.exe
